<nz-header class="admin-navbar">
  <div class="navbar-left">
    <button
      class="navbar-toggle"
      nz-icon
      [nzType]="collapsed ? 'menu-unfold' : 'menu-fold'"
      nzTheme="outline"
      (click)="toggleSidebar()"
    ></button>
    <app-breadcrumb></app-breadcrumb>
  </div>
  <div class="navbar-right">
    <app-search-box></app-search-box>
    <app-change-language></app-change-language>
    <app-toggle-theme></app-toggle-theme>
    <app-fullscreen></app-fullscreen>
    <button
      class="navbar-action"
      nz-icon
      nzType="setting"
      nzTheme="outline"
      (click)="openSettings()"
    ></button>
    <div class="user-dropdown" nz-dropdown [nzDropdownMenu]="userMenu">
      <nz-avatar nzSize="large" [nzText]="avatarText || 'US'" class="user-avatar"></nz-avatar>
    </div>
    <nz-dropdown-menu #userMenu="nzDropdownMenu">
      <ul nz-menu>
        <li nz-menu-item disabled>
          <strong>{{ username }}</strong
          ><br />
          <small>{{ email }}</small>
        </li>
        <li nz-menu-divider></li>
        <li nz-menu-item (click)="openChangePasswordModal()">
          <span nz-icon nzType="key" nzTheme="outline"></span> Đổi mật khẩu
        </li>
        <li nz-menu-divider></li>
        <li nz-menu-item class="text-danger" (click)="logout()">
          <span nz-icon nzType="logout" nzTheme="outline"></span> {{ 'navbar.logout' | translate }}
        </li>
      </ul>
    </nz-dropdown-menu>
  </div>
</nz-header>

<!-- Modal Đổi Mật Khẩu -->
<nz-modal
  [(nzVisible)]="changePasswordVisible"
  nzTitle="Đổi mật khẩu tài khoản"
  (nzOnCancel)="closeChangePasswordModal()"
  (nzOnOk)="submitChangePassword()"
  [nzOkLoading]="changePasswordLoading"
  nzWidth="480px"
  [nzCentered]="true"
>
  <ng-container *nzModalContent>
    @if (changePasswordError) {
      <div
        style="margin-bottom: 16px; color: #ff4d4f; display: flex; align-items: center; gap: 8px"
      >
        <span nz-icon nzType="close-circle" nzTheme="fill"></span>
        <span>{{ changePasswordError }}</span>
      </div>
    }

    <div style="display: flex; flex-direction: column; gap: 16px">
      <div>
        <label style="font-weight: 600; display: block; margin-bottom: 6px"
          >Mật khẩu hiện tại</label
        >
        <nz-input-group nzSize="large" [nzPrefix]="prefixLock" [nzSuffix]="suffixOldPw">
          <input nzSize="large"
            nz-input
            [type]="showOldPassword ? 'text' : 'password'"
            [(ngModel)]="oldPassword"
            placeholder="Nhập mật khẩu hiện tại"
          />
        </nz-input-group>
        <ng-template #suffixOldPw>
          <button
            type="button"
            (click)="showOldPassword = !showOldPassword"
            style="
              border: none;
              background: transparent;
              cursor: pointer;
              color: #64748b;
              padding: 0;
              display: flex;
              align-items: center;
            "
          >
            <span
              nz-icon
              [nzType]="showOldPassword ? 'eye-invisible' : 'eye'"
              nzTheme="outline"
            ></span>
          </button>
        </ng-template>
      </div>

      <div>
        <label style="font-weight: 600; display: block; margin-bottom: 6px">Mật khẩu mới</label>
        <nz-input-group nzSize="large" [nzPrefix]="prefixLock" [nzSuffix]="suffixNewPw">
          <input nzSize="large"
            nz-input
            [type]="showNewPassword ? 'text' : 'password'"
            [(ngModel)]="newPassword"
            placeholder="Nhập mật khẩu mới (tối thiểu 6 ký tự)"
          />
        </nz-input-group>
        <ng-template #suffixNewPw>
          <button
            type="button"
            (click)="showNewPassword = !showNewPassword"
            style="
              border: none;
              background: transparent;
              cursor: pointer;
              color: #64748b;
              padding: 0;
              display: flex;
              align-items: center;
            "
          >
            <span
              nz-icon
              [nzType]="showNewPassword ? 'eye-invisible' : 'eye'"
              nzTheme="outline"
            ></span>
          </button>
        </ng-template>
      </div>

      <div>
        <label style="font-weight: 600; display: block; margin-bottom: 6px"
          >Xác nhận mật khẩu mới</label
        >
        <nz-input-group nzSize="large" [nzPrefix]="prefixLock" [nzSuffix]="suffixConfirmPw">
          <input nzSize="large"
            nz-input
            [type]="showConfirmPassword ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            placeholder="Xác nhận lại mật khẩu mới"
          />
        </nz-input-group>
        <ng-template #suffixConfirmPw>
          <button
            type="button"
            (click)="showConfirmPassword = !showConfirmPassword"
            style="
              border: none;
              background: transparent;
              cursor: pointer;
              color: #64748b;
              padding: 0;
              display: flex;
              align-items: center;
            "
          >
            <span
              nz-icon
              [nzType]="showConfirmPassword ? 'eye-invisible' : 'eye'"
              nzTheme="outline"
            ></span>
          </button>
        </ng-template>
      </div>

      <ng-template #prefixLock>
        <span nz-icon nzType="lock" nzTheme="outline" style="color: #64748b"></span>
      </ng-template>
    </div>
  </ng-container>
</nz-modal>
