<div class="login-welcome">
  <h1 class="login-title">Đổi mật khẩu tài khoản</h1>
  <p class="login-subtitle">
    Vui lòng cập nhật mật khẩu của bạn để đảm bảo an toàn bảo mật hệ thống.
  </p>
</div>

<form (ngSubmit)="onSubmit()" class="login-form" #changePasswordForm="ngForm">
  <div *ngIf="error" class="login-alert">
    <span nz-icon nzType="warning" nzTheme="fill"></span>
    <span>{{ error }}</span>
  </div>

  <!-- Old Password -->
  <div class="login-field">
    <label class="login-label" for="oldPassword">Mật khẩu hiện tại</label>
    <nz-input-group nzSize="large" [nzPrefix]="prefixLock" [nzSuffix]="suffixOldPw" class="login-input-wrap">
      <input nzSize="large"
        id="oldPassword"
        nz-input
        [type]="showOldPassword ? 'text' : 'password'"
        [(ngModel)]="oldPassword"
        name="oldPassword"
        placeholder="Nhập mật khẩu hiện tại"
        required
      />
    </nz-input-group>
    <ng-template #suffixOldPw>
      <button
        type="button"
        class="login-eye"
        (click)="showOldPassword = !showOldPassword"
        tabindex="-1"
      >
        <span
          nz-icon
          [nzType]="showOldPassword ? 'eye-invisible' : 'eye'"
          nzTheme="outline"
        ></span>
      </button>
    </ng-template>
  </div>

  <!-- New Password -->
  <div class="login-field">
    <label class="login-label" for="newPassword">Mật khẩu mới</label>
    <nz-input-group nzSize="large" [nzPrefix]="prefixLock" [nzSuffix]="suffixNewPw" class="login-input-wrap">
      <input nzSize="large"
        id="newPassword"
        nz-input
        [type]="showNewPassword ? 'text' : 'password'"
        [(ngModel)]="newPassword"
        name="newPassword"
        placeholder="Nhập mật khẩu mới (ít nhất 6 ký tự)"
        required
      />
    </nz-input-group>
    <ng-template #suffixNewPw>
      <button
        type="button"
        class="login-eye"
        (click)="showNewPassword = !showNewPassword"
        tabindex="-1"
      >
        <span
          nz-icon
          [nzType]="showNewPassword ? 'eye-invisible' : 'eye'"
          nzTheme="outline"
        ></span>
      </button>
    </ng-template>
  </div>

  <!-- Confirm Password -->
  <div class="login-field">
    <label class="login-label" for="confirmPassword">Xác nhận mật khẩu mới</label>
    <nz-input-group nzSize="large" [nzPrefix]="prefixLock" [nzSuffix]="suffixConfirmPw" class="login-input-wrap">
      <input nzSize="large"
        id="confirmPassword"
        nz-input
        [type]="showConfirmPassword ? 'text' : 'password'"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        placeholder="Xác nhận lại mật khẩu mới"
        required
      />
    </nz-input-group>
    <ng-template #suffixConfirmPw>
      <button
        type="button"
        class="login-eye"
        (click)="showConfirmPassword = !showConfirmPassword"
        tabindex="-1"
      >
        <span
          nz-icon
          [nzType]="showConfirmPassword ? 'eye-invisible' : 'eye'"
          nzTheme="outline"
        ></span>
      </button>
    </ng-template>
  </div>

  <ng-template #prefixLock>
    <span nz-icon nzType="lock" nzTheme="outline"></span>
  </ng-template>

  <button nz-button nzType="primary" nzBlock [nzLoading]="loading" class="login-btn">
    @if (!loading) {
      <span nz-icon nzType="save" nzTheme="outline"></span>
    }
    <span>Cập nhật mật khẩu</span>
  </button>

  <div class="login-footer-text">
    <a (click)="goBack()" class="create-account-link">Bỏ qua & Quay lại trang chủ</a>
  </div>
</form>
