<nz-tabs
  [nzSelectedIndex]="activeTabKey === 'position' ? 0 : 1"

  nzType="card"
  nzSize="large"
>
  <nz-tab nzTitle="Chức Vụ">

  </nz-tab>

  <nz-tab nzTitle="Danh Mục Chức Vụ">
    <app-position-master></app-position-master>
  </nz-tab>
</nz-tabs>
