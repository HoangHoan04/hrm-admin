<nz-card [nzTitle]="titleTemplate" [nzExtra]="extraTemplate" [nzLoading]="loading">
  @if (branch) {
    <div style="padding: 16px;">
      <div style="margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px;">
        <h2 style="margin: 0; color: var(--foreground); font-weight: 600;">{{ branch.name }}</h2>
        <p style="margin: 4px 0 0 0; color: var(--text-secondary); font-size: 14px;">Mã chi nhánh: <strong>{{ branch.code }}</strong></p>
      </div>

      <div nz-row [nzGutter]="[32, 24]">
        <div nz-col [nzXs]="24" [nzSm]="12">
          <div style="margin-bottom: 16px;">
            <span style="font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 4px;">Thuộc công ty</span>
            <span style="font-size: 16px; color: var(--foreground);">{{ branch.companyName }}</span>
          </div>
          <div style="margin-bottom: 16px;">
            <span style="font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 4px;">Điện thoại / Hotline</span>
            <span style="font-size: 16px; color: var(--foreground);">{{ branch.hotline || '---' }}</span>
          </div>
        </div>

        <div nz-col [nzXs]="24" [nzSm]="12">
          <div style="margin-bottom: 16px;">
            <span style="font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 4px;">Địa chỉ</span>
            <span style="font-size: 16px; color: var(--foreground);">{{ branch.address || '---' }}</span>
          </div>
          <div style="margin-bottom: 16px;">
            <span style="font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 4px;">Trạng thái</span>
            <span style="display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: 500; font-size: 12px;"
                  [style.background-color]="branch.status ? 'rgba(76, 175, 80, 0.15)' : 'rgba(244, 67, 54, 0.15)'"
                  [style.color]="branch.status ? '#4caf50' : '#f44336'">
              {{ branch.status ? 'Đang hoạt động' : 'Tạm khóa' }}
            </span>
          </div>
        </div>
      </div>
    </div>
  }
</nz-card>

<ng-template #titleTemplate>
  <span style="font-size: 18px; font-weight: 600; color: var(--foreground);">
    <i nz-icon nzType="apartment" style="margin-right: 8px; color: var(--primary);"></i>
    Chi Tiết Chi Nhánh
  </span>
</ng-template>

<ng-template #extraTemplate>
  <button nz-button nzType="default" (click)="goBack()">
    <i nz-icon nzType="arrow-left"></i> Quay Lại
  </button>
</ng-template>
