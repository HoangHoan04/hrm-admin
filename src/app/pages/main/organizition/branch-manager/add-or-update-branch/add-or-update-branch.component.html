<nz-card [nzTitle]="titleTemplate" [nzExtra]="extraTemplate">
  <ng-container *ngTemplateOutlet="formTpl"></ng-container>
</nz-card>

<ng-template #formTpl>
  <nz-spin [nzSpinning]="loading">
    <form nz-form [formGroup]="validateForm" nzLayout="vertical" (ngSubmit)="submitForm()">
      <div nz-row [nzGutter]="24">
        <div nz-col nzXs="24" nzMd="12">
          <nz-form-item>
            <nz-form-label [nzRequired]="true">Mã chi nhánh</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng nhập mã chi nhánh!">
              <input
                nzSize="large"
                nz-input
                formControlName="code"
                placeholder="Ví dụ: CN-HN"
                [disabled]="isEdit"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col nzXs="24" nzMd="12">
          <nz-form-item>
            <nz-form-label [nzRequired]="true">Thuộc công ty</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng chọn công ty sở hữu!">
              <nz-select formControlName="companyId" nzPlaceHolder="Chọn công ty">
                @for (c of companies; track c.id) {
                  <nz-option [nzValue]="c.id" [nzLabel]="c.name"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <nz-form-item>
        <nz-form-label [nzRequired]="true">Tên chi nhánh</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập tên chi nhánh!">
          <input
            nzSize="large"
            nz-input
            formControlName="name"
            placeholder="Ví dụ: Chi nhánh Hà Nội"
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Địa chỉ</nz-form-label>
        <nz-form-control>
          <input
            nzSize="large"
            nz-input
            formControlName="address"
            placeholder="Ví dụ: Số 12 Khuất Duy Tiến, Thanh Xuân, Hà Nội"
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Dải IP chấm công</nz-form-label>
        <nz-form-control>
          <input
            nzSize="large"
            nz-input
            formControlName="ipAddress"
            placeholder="Ví dụ: 192.168.1.1; 14.226.15.22"
          />
        </nz-form-control>
      </nz-form-item>

      <div nz-row [nzGutter]="24">
        <div nz-col nzXs="24" nzMd="8">
          <nz-form-item>
            <nz-form-label>Tên viết tắt</nz-form-label>
            <nz-form-control>
              <input
                nzSize="large"
                nz-input
                formControlName="shortName"
                placeholder="Ví dụ: CN HN"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col nzXs="24" nzMd="8">
          <nz-form-item>
            <nz-form-label>Loại chi nhánh</nz-form-label>
            <nz-form-control>
              <input
                nzSize="large"
                nz-input
                formControlName="type"
                placeholder="Ví dụ: Văn phòng / Showroom"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col nzXs="24" nzMd="8">
          <nz-form-item>
            <nz-form-label>Nhóm lương</nz-form-label>
            <nz-form-control>
              <input
                nzSize="large"
                nz-input
                formControlName="groupSalary"
                placeholder="Ví dụ: Nhom A / Nhom B"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <nz-form-item>
        <nz-form-label>Mô tả chi nhánh</nz-form-label>
        <nz-form-control>
          <textarea
            nzSize="large"
            nz-input
            formControlName="description"
            rows="3"
            placeholder="Ghi chú chi nhánh..."
          ></textarea>
        </nz-form-control>
      </nz-form-item>

      <div class="form-actions" style="margin-top: 24px">
        <button nz-button nzType="default" type="button" (click)="goBack()" [disabled]="submitting">
          <i nz-icon nzType="arrow-left"></i> Quay lại
        </button>
        <button
          nz-button
          nzType="primary"
          type="submit"
          [nzLoading]="submitting"
          style="margin-left: 12px"
        >
          <i nz-icon nzType="save"></i> Lưu thông tin
        </button>
      </div>
    </form>
  </nz-spin>
</ng-template>

<ng-template #titleTemplate>
  <span style="font-size: 18px; font-weight: 600; color: var(--foreground)">
    <i nz-icon nzType="apartment" style="margin-right: 8px; color: var(--primary)"></i>
    {{ isEdit ? 'Cập Nhật Chi Nhánh' : 'Thêm Chi Nhánh Mới' }}
  </span>
</ng-template>

<ng-template #extraTemplate>
  <button nz-button nzType="default" (click)="goBack()">Danh sách chi nhánh</button>
</ng-template>
