<nz-card
  [nzTitle]="isEdit ? 'Cập Nhật Phòng Ban' : 'Thêm Mới Phòng Ban'"
  [nzExtra]="extraTemplate"
  [nzLoading]="loading"
>
  <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()" nzLayout="vertical">
    <div nz-row [nzGutter]="16">
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired nzFor="code">Mã phòng ban</nz-form-label>
          <nz-form-control nzErrorTip="Vui lòng nhập mã phòng ban!">
            <input
              nzSize="large"
              nz-input
              formControlName="code"
              id="code"
              placeholder="Ví dụ: PB-HCNS"
            />
          </nz-form-control>
        </nz-form-item>
      </div>

      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired nzFor="name">Tên phòng ban</nz-form-label>
          <nz-form-control nzErrorTip="Vui lòng nhập tên phòng ban!">
            <input
              nzSize="large"
              nz-input
              formControlName="name"
              id="name"
              placeholder="Ví dụ: Phòng Hành chính Nhân sự"
            />
          </nz-form-control>
        </nz-form-item>
      </div>

      <div nz-col [nzSpan]="24">
        <nz-form-item>
          <nz-form-label nzRequired nzFor="branchName">Chi nhánh trực thuộc</nz-form-label>
          <nz-form-control nzErrorTip="Vui lòng chọn chi nhánh!">
            <nz-select formControlName="branchName" placeholder="Chọn chi nhánh">
              <nz-option nzValue="Trụ sở chính" nzLabel="Trụ sở chính"></nz-option>
              <nz-option nzValue="Chi nhánh Hà Nội" nzLabel="Chi nhánh Hà Nội"></nz-option>
              <nz-option
                nzValue="Chi nhánh Hồ Chí Minh"
                nzLabel="Chi nhánh Hồ Chí Minh"
              ></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>

      <div nz-col [nzSpan]="24">
        <nz-form-item>
          <nz-form-label nzFor="description">Mô tả / Ghi chú</nz-form-label>
          <nz-form-control>
            <textarea
              nzSize="large"
              nz-input
              formControlName="description"
              id="description"
              [nzAutosize]="{ minRows: 3, maxRows: 6 }"
              placeholder="Nhập mô tả phòng ban..."
            ></textarea>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>

    <div
      style="
        border-top: 1px solid var(--border);
        padding-top: 16px;
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      "
    >
      <button nz-button nzType="default" type="button" (click)="goBack()">Hủy</button>
      <button nz-button nzType="primary" [nzLoading]="submitting" type="submit">Lưu Lại</button>
    </div>
  </form>
</nz-card>

<ng-template #extraTemplate>
  <button nz-button nzType="default" (click)="goBack()">
    <i nz-icon nzType="arrow-left"></i> Quay Lại
  </button>
</ng-template>
